<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GITAGPT</title>
  <style>
    :root {
      --sidebar-bg: #171717; --sidebar-fg: #ececec; --sidebar-muted: #9b9b9b;
      --sidebar-border: #2a2a2a; --sidebar-hover: #262626;
      --main-bg: #ffffff; --text: #2d2d2d; --muted: #6e6e80;
      --accent: #a8451f; --border: #e5e5e5; --bubble-user: #f4f4f4;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:flex; color:var(--text); }

    /* ---------- Sidebar ---------- */
    #sidebar { width:260px; flex:0 0 260px; background:var(--sidebar-bg); color:var(--sidebar-fg);
               display:flex; flex-direction:column; height:100vh; position:relative; }
    #sidebar .brand { padding:16px; font-weight:700; font-size:16px; border-bottom:1px solid var(--sidebar-border); }
    #sidebar .brand span { color:#e07a4c; }
    #sidebar .tagline { padding:12px 16px; font-size:12px; color:var(--sidebar-muted); line-height:1.5; }
    #sidebar .spacer { flex:1; }

    /* provider control pinned bottom-left */
    #providerBox { border-top:1px solid var(--sidebar-border); padding:10px; position:relative; }
    #providerBtn { width:100%; display:flex; align-items:center; gap:10px; background:none; border:none;
                   color:var(--sidebar-fg); padding:10px; border-radius:8px; cursor:pointer; font-size:13px; text-align:left; }
    #providerBtn:hover { background:var(--sidebar-hover); }
    #providerBtn .dot { width:8px; height:8px; border-radius:50%; background:#4caf50; flex:0 0 auto; }
    #providerBtn .label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #providerBtn .chevron { color:var(--sidebar-muted); }

    #providerPanel { display:none; position:absolute; bottom:60px; left:10px; right:10px;
                     background:#2a2a2a; border:1px solid #3a3a3a; border-radius:10px; padding:14px;
                     box-shadow:0 8px 24px rgba(0,0,0,.4); }
    #providerPanel.open { display:block; }
    #providerPanel label { display:block; font-size:11px; color:var(--sidebar-muted); margin:8px 0 4px; }
    #providerPanel select, #providerPanel input {
      width:100%; padding:8px 9px; border-radius:6px; border:1px solid #3a3a3a;
      background:#1f1f1f; color:var(--sidebar-fg); font:inherit; font-size:13px;
    }
    #providerPanel button { width:100%; margin-top:10px; padding:9px; border:none; border-radius:6px;
                             background:var(--accent); color:#fff; font-weight:600; cursor:pointer; font-size:13px; }
    #providerPanel .status { font-size:11px; margin-top:8px; color:var(--sidebar-muted); }
    .hidden { display:none !important; }

    /* ---------- Main chat area ---------- */
    #main { flex:1; display:flex; flex-direction:column; height:100vh; background:var(--main-bg); }
    #thread { flex:1; overflow-y:auto; padding:24px 0; }
    #thread .inner { max-width:720px; margin:0 auto; padding:0 20px; }

    .msg { display:flex; gap:14px; margin-bottom:22px; }
    .msg .avatar { flex:0 0 30px; width:30px; height:30px; border-radius:50%; display:flex;
                   align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; }
    .msg.user .avatar { background:#6e6e80; }
    .msg.assistant .avatar { background:var(--accent); }
    .msg .bubble { flex:1; padding-top:4px; line-height:1.6; white-space:pre-wrap; }
    .msg .sources { margin-top:10px; }
    .chip { display:inline-block; background:var(--bubble-user); border:1px solid var(--border);
            border-radius:14px; padding:2px 10px; margin:2px 4px 0 0; font-size:12px; color:var(--muted); }
    .empty-state { text-align:center; color:var(--muted); margin-top:15vh; }
    .empty-state h2 { color:var(--text); font-size:22px; margin-bottom:6px; }

    /* ---------- Composer ---------- */
    #composer { border-top:1px solid var(--border); padding:16px 20px 20px; }
    #composerInner { max-width:720px; margin:0 auto; display:flex; align-items:flex-end; gap:10px;
                     border:1px solid var(--border); border-radius:16px; padding:10px 10px 10px 16px;
                     box-shadow:0 2px 8px rgba(0,0,0,.05); }
    #question { flex:1; border:none; outline:none; resize:none; font:inherit; font-size:15px;
                max-height:180px; line-height:1.5; }
    #send { flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:none; background:var(--accent);
            color:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
    #send:disabled { opacity:.4; cursor:not-allowed; }
    #hint { text-align:center; font-size:11px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="brand">GITA<span>GPT</span></div>
    <div class="tagline">Ask questions about the Bhagavad-gita As It Is. Answers are grounded in the text with verse citations.</div>
    <div class="spacer"></div>

    <div id="providerBox">
      <div id="providerPanel">
        <label for="provider">LLM</label>
        <select id="provider">
          <option value="local">Local ({{ ollama_display }})</option>
          <option value="gemini">Gemini ({{ gemini_display }})</option>
        </select>

        <div id="keyWrap" class="hidden">
          <label for="apiKey">Gemini API key</label>
          <input id="apiKey" type="password" placeholder="pasted key stays in memory only" />
        </div>

        <button id="saveCfg">Use this</button>
        <div id="cfgStatus" class="status"></div>
      </div>

      <button id="providerBtn">
        <span class="dot"></span>
        <span class="label" id="providerLabel">Local ({{ ollama_display }})</span>
        <span class="chevron">▾</span>
      </button>
    </div>
  </div>

  <div id="main">
    <div id="thread">
      <div class="inner" id="threadInner">
        <div class="empty-state" id="emptyState">
          <h2>GITAGPT</h2>
          <div>Ask anything about the Bhagavad-gita As It Is.</div>
        </div>
      </div>
    </div>

    <div id="composer">
      <div id="composerInner">
        <textarea id="question" rows="1" placeholder="Message GITAGPT..."></textarea>
        <button id="send" title="Send">➤</button>
      </div>
      <div id="hint">Answers are grounded in the source text and cite verses like (BG 2.47).</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function updateProviderLabel() {
      $("providerLabel").textContent = $("provider").selectedOptions[0].textContent;
    }
    updateProviderLabel();

    $("providerBtn").addEventListener("click", () => {
      $("providerPanel").classList.toggle("open");
    });
    document.addEventListener("click", (e) => {
      if (!$("providerBox").contains(e.target)) $("providerPanel").classList.remove("open");
    });

    $("provider").addEventListener("change", () => {
      $("keyWrap").classList.toggle("hidden", $("provider").value !== "gemini");
    });

    $("saveCfg").addEventListener("click", async () => {
      const body = {
        provider: $("provider").value,
        api_key: $("apiKey").value || null,
      };
      const r = await fetch("/config", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      });
      const data = await r.json();
      $("cfgStatus").textContent = data.ok ? `Using ${data.provider} · ${data.model}` : `Error: ${data.error}`;
      if (data.ok) {
        updateProviderLabel();
        $("providerPanel").classList.remove("open");
      }
    });

    // Auto-grow the textarea.
    $("question").addEventListener("input", () => {
      $("question").style.height = "auto";
      $("question").style.height = Math.min($("question").scrollHeight, 180) + "px";
    });
    $("question").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    $("send").addEventListener("click", sendMessage);

    function addMessage(role) {
      $("emptyState")?.remove();
      const wrap = document.createElement("div");
      wrap.className = `msg ${role}`;
      wrap.innerHTML = `
        <div class="avatar">${role === "user" ? "U" : "G"}</div>
        <div>
          <div class="bubble"></div>
          <div class="sources"></div>
        </div>`;
      $("threadInner").appendChild(wrap);
      $("thread").scrollTop = $("thread").scrollHeight;
      return wrap;
    }

    async function sendMessage() {
      const text = $("question").value.trim();
      if (!text) return;
      $("question").value = "";
      $("question").style.height = "auto";
      $("send").disabled = true;

      addMessage("user").querySelector(".bubble").textContent = text;
      const assistantEl = addMessage("assistant");
      const bubble = assistantEl.querySelector(".bubble");
      const sourcesEl = assistantEl.querySelector(".sources");

      try {
        const resp = await fetch("/chat", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ question: text }),
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop();
          for (const part of parts) {
            const line = part.replace(/^data: /, "").trim();
            if (!line) continue;
            handleEvent(JSON.parse(line), bubble, sourcesEl);
          }
          $("thread").scrollTop = $("thread").scrollHeight;
        }
      } catch (e) {
        bubble.textContent = "Request failed: " + e;
      } finally {
        $("send").disabled = false;
      }
    }

    function handleEvent(ev, bubble, sourcesEl) {
      if (ev.type === "token") {
        bubble.textContent += ev.text;
      } else if (ev.type === "sources") {
        const chips = ev.sources
          .filter(s => s.reference)
          .map(s => `<span class="chip">${s.reference}${s.page ? " · p." + s.page : ""}</span>`)
          .join("");
        sourcesEl.innerHTML = chips;
      } else if (ev.type === "error") {
        bubble.textContent = "Error: " + ev.message;
      }
    }
  </script>
</body>
</html>
